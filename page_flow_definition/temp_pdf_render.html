    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        
        body {
            font-family: 'Inter', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        h1 { 
            font-size: 2.2em; 
            text-align: center; 
            color: #000; 
            font-weight: 800;
            border-bottom: 4px solid #00F5FF; 
            padding-bottom: 15px; 
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .section {
            background: #fff;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            page-break-after: always;
            border: 1px solid #eee;
            min-height: 900px;
            display: flex;
            flex-direction: column;
        }

        .section:last-child { page-break-after: auto; }

        h2 { 
            font-size: 1.6em; 
            margin-top: 0; 
            margin-bottom: 15px;
            color: #000;
            font-weight: 800;
            display: flex;
            align-items: center;
        }
        
        h2::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 24px;
            background: #00F5FF;
            margin-right: 12px;
            border-radius: 3px;
        }

        .page-name-tag {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            flex-grow: 1;
        }

        .legend-column {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #efefef;
        }

        .legend-column h3 {
            margin-top: 0;
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
        }

        .image-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .image-container img {
            width: 100%;
            height: auto;
            border-radius: 4px; /* Fixed: Rectangle with slight round */
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        .description-box {
            background: #f1fcfe;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #00F5FF;
        }

        .description-box h3 {
            margin-top: 0;
            font-size: 1.1em;
            color: #007c85;
            margin-bottom: 8px;
        }

        .role-text {
            font-size: 0.95em;
            color: #333;
        }

        li, p { word-break: keep-all; }

        @media print {
            body { background: white; padding: 0; }
            .section { box-shadow: none; border: 1px solid #ddd; margin: 0; width: 100%; height: 100%; }
        }
    </style>
</head>

d":false},{"title":"1_3 메인 랜딩 하단 (Footer)","image":"1_3_Main_Page.png","pageName":"1_3 메인 랜딩 하단 (Footer & Video)","role":"- 서비스 소개 영상을 재생할 수 있는 시네마틱 뷰어 공간이 자리합니다.\r\n- 회사 소개, 서비스 바로가기 링크, 이용약관, 연락처(Contact) 정보를 제공합니다.","regions":"- **[분홍색 영역]** AUNOVA SOLUTION 비디오 플레이어 영역\r\n- **[주황색 영역]** 하단 AUNOVA 회사 정보 및 로고\r\n- **[초록색 영역]** 서비스 바로가기 링크 및 연락처 정보 영역\r\n- **[하늘색 영역]** 저작권 표기 및 하단 약관 링크 (Privacy, Terms)","isContinued":false},{"title":"2 Nova3D 의뢰서작성 (Synthesis Workspace)","image":"2_Synthesis_Workspace.png","pageName":"2 Nova3D 의뢰서작성 (Page 2)","role":"- 사용자가 실제로 3D 생성을 의뢰하고 작업하는 메인 워크스페이스(Workspace)입니다.\r\n- 좌측 패널에서 Lv.1~Lv.5 난이도/품질 설정, 프로젝트 이름 입력, 생성 요청 사항(프롬프트) 작성 및 레퍼런스 이미지 업로드를 지원합니다.\r\n- 상단의 진행 단계 네비게이션(SYNTHESIS 탭 활성화)과 중앙의 진행 애니메이션 뷰어, 그리고 우측의 예상 결제 금액 확인 창을 포함하는 가장 핵심적인 인터랙션 페이지입니다.","regions":"- **[빨간색 영역]** 로고 (AUNOVA)\r\n- **[주황색 영역]** 난이도/품질(레벨) 설정 탭 (Lv.1 ~ Lv.5)\r\n- **[노란색 영역(좌측)]** 프로젝트명 입력창\r\n- **[녹색 영역(좌측)]** 생성 요청 사항 (프롬프트 텍스트) 입력창\r\n- **[하늘색 영역(좌측)]** 레퍼런스 이미지 드롭존 영역\r\n- **[파란색 영역]** 샘플 아웃풋 썸네일 확인창\r\n- **[보라색/자주색 영역(좌측하단)]** 3D 오픈젝트 생성하기 (GENERATE OBJECT) 버튼\r\n- **[분홍색 영역]** 상단 진행률 네비게이터 (SYNTHESIS / RESULT / DELIVERY)\r\n- **[노란색 영역(우측상단)]** 로그인 / 회원가입 버튼\r\n- **[연노란색 영역(우측)]** 네비게이션 메뉴 영역\r\n- **[연두색 영역(우측하단)]** 총 결제 예상 금액 및 보증금 안내 패널\r\n- **[하늘색 영역(우측최하단)]** 소셜 미디어 아이콘 등 푸터 영역","isContinued":false},{"title":"c 보증금 결제 페이지 (Deposit Payment Modal)","image":"c_Deposit_Payment_Page.png","pageName":"c 보증금 결제 (Deposit Payment Modal)","role":"- 2페이지 3D 생성 의뢰 버튼 클릭 시 나타나는 선결제 확인용 모달입니다.\r\n- 총 금액 중 작업 시작을 위한 임시 보증금 결제를 요청합니다.","regions":"- **[빨간색 영역]** 없음 (모달창 전체)\r\n- **[노란색 영역]** 경고/알림 아이콘 (결제 확인)\r\n- **[파란색 텍스트 영역]** 총 금액 및 우선 결제(보증금) 금액 표기\r\n- **[자주색 버튼 영역(좌)]** 돌아가기 (Cancel) 버튼\r\n- **[하늘색 버튼 영역(우)]** 결제 및 생성 (Confirm & Pay) 버튼\r\n\r\n---","isContinued":false},{"title":"3 Nova3D 생성대기 페이지 (Processing Wait Page)","image":"3_Processing_Wait_Page.png","pageName":"3 Nova3D 생성대기 페이지 (Page 3)","role":"- 앞선 의뢰서 작성 및 보증금 결제 완료 후, AI가 3D 모델을 실제로 생성하는 동안 표시되는 대기(Loading) 화면입니다.\r\n- 중앙에 AUNOVA 고유의 반짝이는 별 애니메이션과 함께 사용자가 입력한 작품명이 '탄생하고 있습니다...'라는 동적인 타이핑 텍스트 효과로 표시되어 지루함을 덜어줍니다.\r\n- 일정 시간 로딩이 완료되면 다음 단계(결과 뷰어)로 넘어갈 수 있는 'NEXT' 버튼이 활성화되는 트랜지션 역할의 페이지입니다.","regions":"- **[초록색 영역]** 좌측 상단 로고 (AUNOVA)\r\n- **[하늘색 영역]** 우측 상단 로그인 / 회원가입 버튼\r\n- **[보라색 영역]** 우측 사이드 네비게이션 메뉴 (Aunova Gallery, Reviews)\r\n- **[빨간색 영역]** 중앙 3D 진행 애니메이션 뷰어 (인터랙티브 별 심볼)\r\n- **[주황색 영역]** 현재 진행 상태 표시 텍스트창 ('탄생하고 있습니다...', '잠시만 기다려 주세요...')\r\n- **[노란색 영역]** 다음 단계(NEXT) 이동 버튼\r\n\r\n---","isContinued":false},{"title":"4 Nova3D 결과 선택 페이지 (Result Viewer & Export)","image":"4_Result_Viewer_Export.png","pageName":"4 Nova3D 결과 선택 페이지 (Page 4)","role":"- 생성 완료된 3D 모델(결과물)을 확인하고 스타일을 변경하거나, 파일을 외부로 내보내는(Export) 최종결과 확인 페이지입니다.\r\n- 좌측 패널(STYLE SELECT)에서는 A~E 스타일 옵션 및 컬러 팔레트로 재질/색상을 실시간 변경할 수 있습니다.\r\n- 중앙 뷰어를 통해 결과물을 3D 캔버스 공간에서 돌려가며 자세하게 확인(RESULT 탭 활성화)할 수 있습니다.\r\n- 우측 패널(EXPORT)에서는 생성된 데이터를 다운로드(STL, OBJ, PLY)하거나 3D Print 요청을 추가 결제 금액과 함께 진행할 수 있습니다.","regions":"- **[살구색 영역]** 좌측 상단 로고 (AUNOVA)\r\n- **[빨간색 영역]** 좌측 스타일 선택 패널 (STYLE SELECT - A, B, C, D, E)\r\n- **[주황색 영역]** 좌측 하단 컬러 팔레트 패널 (COLOR PALETTE)\r\n- **[보라색 영역]** 상단 진행 단계 네비게이터 (SYNTHESIS / RESULT / DELIVERY)\r\n- **[파란색 영역]** 중앙 3D 모델 뷰어 영역 (3D Model Viewer)\r\n- **[노란색 영역]** 우측 상단 파일 추출 메뉴 (EXPORT - Download STL, OBJ, PLY)\r\n- **[초록색 영역]** 우측 하단 3D Print 요청 영역 (금액 안내 및 결제 버튼)\r\n\r\n---","isContinued":false},{"title":"5 Nova3D 3D printing 요청완료 페이지 (Delivery & Home)","image":"5_Delivery_Home.png","pageName":"5 Nova3D 3D printing 요청완료 페이지 (Page 5)","role":"- 앞선 4페이지에서 '3D Print 요청'을 결제/승인한 뒤 전환되는 모의 배송 안내 화면(Delivery)입니다.\r\n- 반짝이는 별 애니메이션과 함께 '[작품명]이(가) 집으로 가고 있습니다...'라는 메시지와 '안전하게 배송해 드리겠습니다...'라는 따뜻한 텍스트를 제공하여 결제 후 안도감과 기대감을 줍니다.\r\n- 상단 네비게이션은 최종 'DELIVERY' 단계가 활성화되며, 중앙의 'HOME' 버튼을 통해 다시 1페이지(메인 앱 화면)로 자연스럽게 복귀하는 순환 구조를 마무리지어 줍니다.","regions":"- **[빨간색 영역]** 좌측 상단 로고 (AUNOVA)\r\n- **[주황색 영역]** 상단 진행 완료 단계 네비게이터 (SYNTHESIS / RESULT / DELIVERY)\r\n- **[노란색 영역]** 중앙 3D 진행 애니메이션 뷰어 (인터랙티브 별 심볼)\r\n- **[초록색 영역]** 배송 완료 및 마무리 안내 텍스트창 ('집으로 가고 있습니다...', '안전하게 배송해 드리겠습니다...')\r\n- **[하늘색 영역]** 중앙 하단 HOME (메인화면 복귀) 버튼","isContinued":false},{"title":"a 로그인 페이지 (Login Page / Modal)","image":"a_Login_Page.png","pageName":"a 로그인 페이지 (Login Modal)","role":"- 플랫폼 내의 개인화된 서비스(2페이지 워크스페이스 등)에 접근하기 전, 사용자 인증을 거치는 로그인 창입니다.\r\n- 단독 페이지라기보다는 다른 페이지(주로 1페이지 메인) 위에 겹쳐서 뜨는 모달(Modal) 형태로 구현되어 화면 전환의 이질감을 줄입니다.\r\n- 이메일/비밀번호 기본 로그인 외에도 네이버, 구글, 카카오, 애플 등 다양한 소셜 로그인(SNS) 버튼을 제공하여 사용자 접근성을 높인 것이 특징입니다.","regions":"- **[하늘색 영역]** 로그인 창 전체 모달 및 상단 안내 영역\r\n- **[빨간색 영역]** 아이디(또는 이메일) 및 비밀번호 입력 폼\r\n- **[주황색 영역]** SNS 간편 로그인 옵션 버튼들 (네이버, 구글, 카카오, Apple)\r\n- **[노란색 영역]** 하단 'CONNECT' (로그인 실행) 메인 버튼\r\n- **[초록색 영역]** 최하단 '회원가입' 텍스트 이동 링크","isContinued":false},{"title":"e 마이페이지 (My Page / Workspace History Modal)","image":"mypage_view.png","pageName":"e 마이페이지 (My Page Modal)","role":"- 로그인 후 사용자가 자신의 이전 작업 내역과 현재 진행 중인 프로젝트를 한눈에 확인할 수 있는 개인 워크스페이스 관리창입니다.\r\n-","regions":"- **[상단 영역]** 'MY PAGE' 타이틀 및 사용자 워크스페이스 안내\r\n- **[중앙 리스트 영역]** 개별 작업 항목 (썸네일, 프로젝트명, 날짜, 버전 정보)\r\n- **[상태 배지 영역]** 작업 진행 상태 (Green: 완료, Cyan: 진행중, Red: 에러)\r\n- **[하단 버튼 영역]** 리스트 새로고침 및 워크스페이스 닫기 버튼","isContinued":false},{"title":"b 회원가입 페이지 (Signup Page / Modal)","image":"b_Signup_Page.png","pageName":"b 회원가입 페이지 (Signup Modal)","role":"- AUNOVA 플랫폼의 신규 계정을 생성하는 모달 기반의 진입점입니다.\r\n- 사용자 이름, 이메일, 아이디(중복확인 지원), 비밀번호, 연락처, 결제 수단 등록 등 상세한 회원 정보를 기입받는 구조로 설계되었습니다.\r\n- 서비스 이용약관, 개인정보 수집 등 필수/선택 약관 동의 체크박스를 포함하여 정식 서비스 제공을 위한 법적, 행정적 절차를 완료하게 해줍니다.","regions":"- **[빨간색 영역]** 회원가입 모달 전체창 및 타이틀 영역\r\n- **[주황색 영역]** 기본 인적사항 입력 필드 (이름, 이메일, 아이디, 비밀번호, 연락처 등)\r\n- **[하늘색 영역(작은원)]** 비밀번호 조건 안내 툴팁/아이콘\r\n- **[노란색 영역]** 결제 수단 선택 드롭다운 영역\r\n- **[초록색 영역]** 외부 약관 동의 체크박스 및 전문 보기 링크 모음 패널\r\n- **[파란색 영역]** 개별 필수 약관 '보기' 링크 텍스트","isContinued":false},{"title":"d Nova3D 최종 결제 페이지 (Final Payment Page / Modal)","image":"d_Final_Payment_Page.png","pageName":"d Nova3D 최종 결제 페이지 (Final Payment Modal)","role":"- 앞선 4페이지(결과 선택 및 Export)에서 최종 결과물 확인 후 '3D Print 요청' 버튼을 클릭했을 때 나타나는 안내 모달입니다.\r\n- 3D 프린트를 진행하기 위해 앞서 지불한 보증금을 제외한 '잔액(예: ₩178,000)'을 최종적으로 결제 요청하는 단계입니다.\r\n- '결제 확인' 클릭 시 인증 및 승인 절차를 거쳐 마지막 배송 단계(5페이지)로 흐름을 이어가며, AUNOVA 플랫폼 내에서의 상거래 사이클을 완성합니다.","regions":"- **[빨간색 영역]** 최종 잔액 추가 결제 모달 전체창 영역\r\n- **[초록색 영역]** 결제 금액 상세 정보 (잔액 추가 결제 타이틀 및 총 결제 필요 금액) 패널\r\n- **[주황색/하늘색 영역]** 결제 승인 및 진행 (결제 확인) 메인 버튼\r\n- **[노란색 영역]** 취소 및 모달 닫기 (이전으로) 텍스트 버튼","isContinued":false},{"title":"ㄱ factory 페이지 (Admin Factory Page)","image":"Admin_Factory_Page.png","pageName":"ㄱ factory 페이지 (Admin Factory Page)","role":"- AUNOVA 서비스 관리자(운영자)가 고객들의 3D 주문/의뢰 내역을 확인하고 관리하는 후방 운영(Back-office) 페이지입니다.\r\n- '주문 리스트' 패널을 통해 고객명, 작품 제목, 난이도(Lv), 진행 상태(완료/진행중/대기), 결제 금액 등의 의뢰 접수 및 진행 현황을 한눈에 파악할 수 있습니다.\r\n- 우측의 'CINEMA VIEWER' 영역에서는 특정 주문을 선택하여 결과 모델을 검토할 수 있으며, 상단의 '작업지시서 인쇄' 및 'L-P Lab' 연동 버튼을 통해 실제 3D 프린팅 공정으로 작업을 전달하는 허브 역할을 수행합니다.","regions":"**상단 공통 라인**\r\n- **[주황색 영역]** 관리자 첫 화면 메인 타이틀 (THE FACTORY) 및 페이지 구분 안내\r\n- **[노란색 영역]** 또 다른 관리자 페이지인 'ㄴ P Lab' 으로 이동하는 전환 링크 버튼\r\n- **[초록색 영역]** 주문 내역 기반 작업지시서 인쇄(프린트) 기능 버튼\r\n**좌측 패널 (주문 리스트)**\r\n- **[빨간색 영역]** 좌측 전역 - 접수된 전체 '주문 리스트' 현황판 패널\r\n- **[보라색 테두리 영역]** 주문 번호 (No.) 컬럼\r\n- **[흰색 테두리 영역]** 고객명 (Customer) 컬럼\r\n- **[살구색 테두리 영역]** 의뢰 작품 제목 (Title) 컬럼\r\n- **[구리색/안개색 테두리 영역]** 선택된 난이도 레벨 (Lv) 컬럼\r\n- **[연두색 테두리 영역]** 현재 작업 상태 (진행중, 완료, 대기) 컬럼\r\n- **[연노란색 테두리 영역]** 총 결제 금액 표기 컬럼\r\n**우측 패널 (CINEMA VIEWER)**\r\n- **[파란색 영역]** 우측 전역 - 'CINEMA VIEWER' (3D 모델 검토 뷰어) 통합 패널\r\n- **[연보라색 테두리 영역]** 메인 3D 모델 표시 캔버스 (모델 렌더링 영역)\r","isContinued":false},{"title":"ㄱ factory 페이지 (Admin Factory Page) (Continued)","image":null,"pageName":"ㄱ factory 페이지 (Admin Factory Page)","role":"","regions":"- **[하늘색 테두리 영역]** 세부 모델 뷰 제어/관련 옵션 인터페이스 (썸네일 혹은 툴바) 하단 영역","isContinued":true},{"title":"ㄴ lab 페이지 (Admin Lab Page)","image":"Admin_Lab_Page.png","pageName":"ㄴ lab 페이지 (Admin Lab Page)","role":"- AUNOVA AI 기술 및 모델의 핵심 성능을 관리/조정하는 시스템 관리자(엔지니어링) 레벨의 심화 대시보드입니다.\r\n- 좌측 'AI MODEL DECK' 패널에서 각 모델별 활성 API 종류 확인 및 현재 사용량 모니터링, 그리고 시스템 한계치에 따른 사용률(할당량) 변경 및 조정을 실시간으로 관리할 수 있습니다.\r\n- 우측 'TIME MACHINE' 패널에서는 AI 과정 성공 및 실패율을 분석하고, 적용 중인 프롬프트와 버전/파라미터를 통제할 뿐 아니라 새로운 학습 내용(Merge)의 추가 및 제거를 실시간으로 통제하는 테스트/서버 릴리즈 통제실 역할을 수행합니다.","regions":"- **[빨간색 영역]** 관리자 랩 메인 타이틀 (THE LAB)\r\n- **[파란색 영역]** 이전 화면(ㄱ P Factory)으로 돌아가기 버튼\r\n- **[주황색 영역]** 좌측 전역 - 'AI MODEL DECK' (AI 모델별 사용량 및 API 현황 모니터링) 패널\r\n- **[초록색 영역]** 우측 전역 - 'TIME MACHINE' (AI 모델 상세 통제, 버전 롤백/업데이트 등) 패널\r\n- **[보라색 영역]** 타임머신 패널 내 'Version Slider' (AI 모델 버전 선택 슬라이더 컨트롤)\r\n- **[남색 영역]** 타임머신 패널 내 현재 버전 설정(Config/Parameter) 코드/텍스트 뷰 영역\r\n- **[회색 영역]** 중복 적용 (Merge) 기능 실행 버튼","isContinued":false}]};
        const container = document.getElementById('sections-container');
        document.getElementById('intro').innerHTML = marked.parse(data.intro || '');

        data.sections.forEach(s => {
            const secDiv = document.createElement('div');
            secDiv.className = 'section';
            
            const imgPath = s.image ? encodeURI("file:///" + "C:/antigravity/aunova옴니solution/page_flow_definition/" + s.image) : '';
            
            let rightContent = '';
            if (!s.isContinued) {
                rightContent = `
                    <div class="image-container">
                        <img src="${imgPath}" alt="${s.title}" />
                    </div>
                    <div class="description-box">
                        <h3>Role & Purpose</h3>
                        <div class="role-text">${marked.parse(s.role)}</div>
                    </div>
                `;
            } else {
                rightContent = `
                    <div style="background: #fdfdfd; border: 1px dashed #ccc; flex-grow: 1; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #999;">
                        (Content continued from previous page)
                    </div>
                `;
            }

            secDiv.innerHTML = `
                <h2>${s.title}</h2>
                <div class="page-name-tag">${s.pageName}</div>
                
                <div class="main-layout">
                    <div class="legend-column">
                        <h3>UI REGIONS</h3>
                        <div class="region-list">${marked.parse(s.regions)}</div>
                    </div>
                    <div class="image-column">
                        ${rightContent}
                    </div>
                </div>
            `;
            container.appendChild(secDiv);
        });

        Promise.all(Array.from(document.images).map(img => {
            if (img.complete) return Promise.resolve();
            return new Promise(resolve => {
                img.onload = resolve;
                img.onerror = resolve;
            });
        })).then(() => {
            window.__done = true;
        });
    </script>
